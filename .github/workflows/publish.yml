# ============================================================
# Synth Continuous Publication — GitHub Actions Adapter
# ============================================================
# This is a platform adapter. The governance specification lives
# in docs/guides/operator/continuous-publication.md.
#
# Triggered on every merge to main. It regenerates public
# documentation from the knowledge base and deploys the static
# website to GitHub Pages. No manual deployment step is required.
# ============================================================

name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      ${{
        !contains(github.event.head_commit.message, '[skip ci]') &&
        github.event.head_commit.author.name != 'github-actions[bot]'
      }}
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Check internal links
        run: npm run docs:check-links

      - name: Verify documentation projection
        run: npm run docs:verify-projection

      - name: Verify website synchronization
        run: npm run docs:verify-website-sync

      - name: Regenerate documentation
        run: npm run docs:generate

      - name: Commit regenerated documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/generated/
          if git diff --staged --quiet; then
            echo "No documentation changes to commit."
          else
            git commit -m "docs: regenerate documentation [skip ci]"
            git push
          fi

      - name: Copy installer to website
        run: cp scripts/install.sh website/install.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/

      - name: Deploy website to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify installer is reachable
        env:
          INSTALLER_BASE_URL: ${{ vars.SYNTH_INSTALLER_BASE_URL || 'https://synth-framework.github.io/synth' }}
        run: |
          echo "Checking installer at ${INSTALLER_BASE_URL}/install.sh"
          curl -fsSL --max-time 30 "${INSTALLER_BASE_URL}/install.sh" | head -n 5
          echo "Installer reachable."
