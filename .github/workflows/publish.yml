# ============================================================
# Synth Continuous Publication — GitHub Actions Adapter
# ============================================================
# This is a platform adapter. The governance specification lives
# in docs/guides/operator/continuous-publication.md.
#
# Triggered on every merge to main. It regenerates public
# documentation from the knowledge base and deploys the static
# website to GitHub Pages. No manual deployment step is required.
# ============================================================

name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      ${{
        !contains(github.event.head_commit.message, '[skip ci]') &&
        github.event.head_commit.author.name != 'github-actions[bot]'
      }}
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Generate projections
        run: npm run docs:generate

      - name: Validate projection graph
        run: npm run docs:validate-projections

      - name: Check internal links
        run: npm run docs:check-links

      - name: Verify website synchronization
        run: npm run docs:verify-website-sync

      - name: Copy installer to website
        run: cp scripts/install.sh website/install.sh

      - name: Generate installer manifest
        run: node scripts/generate-installer-manifest.js

      - name: Validate installer manifest
        run: node scripts/verify-installer-manifest.js

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/

      - name: Deploy website to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record deployment URL
        env:
          DEPLOYMENT_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          echo "GitHub Pages deployment URL: ${DEPLOYMENT_URL}"
          {
            echo "## GitHub Pages Deployment ✅"
            echo ""
            echo "- **Environment:** github-pages"
            echo "- **Deployment URL:** ${DEPLOYMENT_URL}"
            echo "- **Artifact path:** website/"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify installer is reachable
        env:
          INSTALLER_BASE_URL: ${{ vars.SYNTH_INSTALLER_BASE_URL || 'https://synth-framework.github.io/synth' }}
        run: |
          set -euo pipefail
          installer_url="${INSTALLER_BASE_URL}/install.sh"
          echo "Checking installer at ${installer_url}"

          max_attempts=10
          backoff_seconds=15
          attempt=1
          http_code="0"
          body=""

          while [ ${attempt} -le ${max_attempts} ]; do
            echo "Attempt ${attempt}/${max_attempts}: GET ${installer_url}"
            response_file=$(mktemp)
            http_code=$(curl -sL --max-time 30 -o "${response_file}" -w "%{http_code}" "${installer_url}" || true)

            if [ "${http_code}" = "200" ]; then
              body=$(head -n 1 "${response_file}")
              if [ "${body}" = "#!/usr/bin/env bash" ]; then
                rm -f "${response_file}"
                echo "✅ Installer is reachable and has a valid bash shebang."
                {
                  echo "## Installer Availability ✅"
                  echo ""
                  echo "- **URL:** ${installer_url}"
                  echo "- **Status:** 200 OK"
                  echo "- **Shebang:** ${body}"
                  echo "- **Attempts:** ${attempt}"
                } >> "${GITHUB_STEP_SUMMARY}"
                exit 0
              else
                echo "⚠️ HTTP 200 received, but first line was '${body}' instead of '#!/usr/bin/env bash'. Retrying..."
              fi
            else
              echo "⚠️ Installer returned HTTP ${http_code}. Retrying in ${backoff_seconds}s..."
            fi

            rm -f "${response_file}"

            if [ ${attempt} -eq ${max_attempts} ]; then
              echo "❌ Installer is not reachable at ${installer_url} after ${max_attempts} attempts."
              {
                echo "## Installer Availability ❌"
                echo ""
                echo "- **URL:** ${installer_url}"
                echo "- **Last HTTP status:** ${http_code}"
                echo "- **Attempts:** ${max_attempts}"
              } >> "${GITHUB_STEP_SUMMARY}"
              exit 1
            fi

            sleep ${backoff_seconds}
            attempt=$((attempt + 1))
          done
