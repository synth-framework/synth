# ============================================================
# Synth Proof Gate — GitHub Actions Adapter
# ============================================================
# This is a platform adapter. The governance specification lives
# in docs/governance.md. This workflow invokes the single canonical
# verification command: npm run govern.
#
# No GitHub-specific logic should be added here. If CI behavior
# needs to change, update docs/governance.md and the npm scripts.
# ============================================================

name: Proof Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run canonical governance pipeline
        run: npm run govern

      - name: Upload proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: synth-proof
          path: proof/proof-*.json
