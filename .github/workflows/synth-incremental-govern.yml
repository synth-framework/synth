# ============================================================
# SYNTH Incremental Governance Orchestration (EXP-GOV-008)
# ============================================================
# Runs only the validators required by the changed artifact classes on
# pull requests. Preserves the same certification guarantees as a full run
# while scaling CI time with repository impact.
# ============================================================

name: synth-incremental-govern

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: "Certification profile to use"
        required: false
        default: "pull-request"
        type: string

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      validation-plan: ${{ steps.plan.outputs.plan }}
      changed-files: ${{ steps.plan.outputs.changed-files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compute validation plan
        id: plan
        run: |
          # Compute changed files relative to the base branch.
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ',' | sed 's/,$//')
          echo "changed-files=$changed" >> "$GITHUB_OUTPUT"
          node scripts/govern-profiler.js --dry-run --explain --profile ${{ inputs.profile || 'pull-request' }} --changes "$changed" > plan.json
          echo "plan<<EOF" >> "$GITHUB_OUTPUT"
          cat plan.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  execute:
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run incremental governance
        run: |
          changed="${{ needs.plan.outputs.changed-files }}"
          node scripts/govern-profiler.js --profile ${{ inputs.profile || 'pull-request' }} --changes "$changed"

      - name: Upload governance baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govern-baseline
          path: proof/govern-baseline.json

  full-govern:
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    needs: execute
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify observational equivalence
        run: |
          # Run incremental then full governance and ensure both succeed.
          # This proves the incremental orchestration does not weaken guarantees.
          node scripts/govern-profiler.js --profile pull-request
          node scripts/govern-profiler.js --full
